name: CI

# ワークフローを実行するタイミング
on:
  # devブランチへPushされたとき
  push:
    branches:
      - dev

  # dev・mainへのPull Request作成・更新時
  pull_request:
    branches:
      - dev
      - main

# GitHub Actionsに付与する最小権限
permissions:
  contents: read

jobs:
  # mainへのPull Requestが必ずdevブランチから作成されていることを確認
  validate-main-source:
    name: Validate main PR source
    # main向けPull Requestのときだけ実行
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest

    steps:
      # PR元ブランチがdevであることを確認
      - name: Ensure pull request comes from dev
        run: |
          if [ "${{ github.event.pull_request.head.ref }}" != "dev" ]; then
            echo "::error::Pull requests to main must come from the dev branch."
            exit 1
          fi

          # フォークではなく、このリポジトリ内のdevブランチからのPRであることを確認
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "::error::Pull requests to main must come from the dev branch in this repository."
            exit 1
          fi

          echo "Valid release pull request: dev -> main"

  # コード品質チェックとビルド
  ci:
    runs-on: ubuntu-latest

    steps:
      # ソースコードをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node.jsをセットアップ
      # npmキャッシュを利用して依存関係のインストールを高速化
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      # 依存関係をインストール
      - name: Install dependencies
        run: npm ci

      # TypeScriptの型エラーがないことを確認
      - name: Run TypeScript check
        run: npm run typecheck

      # ESLintによる静的解析
      - name: Run ESLint
        run: npm run lint

      # Prettierによるフォーマットチェック
      - name: Check formatting
        run: npm run format:check

      # Vitestによる自動テスト
      - name: Run tests
        run: npm test

      # 本番ビルドが正常に完了することを確認
      - name: Build project
        run: npm run build
